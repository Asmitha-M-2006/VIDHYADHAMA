<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results &amp; Achievements | Vidhyadhama</title>
    <link rel="icon" href="./assets/logo/favicon.png" type="image/png">
    <link rel="stylesheet" href="./css/style.css?v=1.1">
    <link rel="stylesheet" href="./css/responsive.css?v=1.1">
</head>
<body>

    <div id="navbar"></div>

    <main class="inner-page-shell results-page">
      <section class="page-hero-small results-hero">
        <div class="container">
          <div class="results-hero-content reveal-on-scroll">
            <h1>Results &amp; Achievements</h1>
            <p>Board achievers presented with clarity, consistency, and academic focus.</p>
          </div>
        </div>
      </section>

      <section class="results-top-section section-padding">
        <div class="container">
          <div class="section-heading-block reveal-on-scroll">
            <p class="section-kicker">Top Achievers</p>
            <h2 class="section-title text-center">Leading Board Performers</h2>
            <p>Top three board achievers based on rank and marks.</p>
          </div>
          <div class="results-card-grid results-top-grid" data-results-section="top-achievers"></div>
        </div>
      </section>

      <section class="results-all-section section-padding bg-light-ivory">
        <div class="container">
          <div class="section-heading-block reveal-on-scroll">
            <p class="section-kicker">All Achievers</p>
            <h2 class="section-title text-center">Board Achievement Records</h2>
            <p>Student results shown in a clean, consistent grid.</p>
          </div>
          <div class="results-card-grid results-all-grid" data-results-section="all-achievers"></div>
        </div>
      </section>
    </main>

    <div id="footer"></div>

    <script src="./js/partials.js"></script>
    <script src="./js/results.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</body>
</html>
