<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty | Vidhyadhama</title>
    <link rel="icon" href="./assets/logo/favicon.png" type="image/png">
    <link rel="stylesheet" href="./css/style.css?v=1.1">
    <link rel="stylesheet" href="./css/responsive.css?v=1.1">
</head>
<body>

    <div id="navbar"></div>

    <main class="inner-page-shell">
      <!-- Page Hero Section -->
      <section class="page-hero-small faculty-hero">
        <div class="container">
          <h1 class="page-title">Our Faculty</h1>
          <p class="page-subtext">Experienced educators and leaders guiding academic excellence</p>
        </div>
      </section>

      <!-- Administration Section -->
      <section class="administration-section section-padding">
        <div class="container">
          <h2 class="section-title clean-title">Administration</h2>
          <div class="admin-grid" data-admin-grid></div>
        </div>
      </section>

      <!-- Science Department -->
      <section class="faculty-section faculty-department-section section-padding bg-light-ivory">
        <div class="container">
          <h2 class="section-title clean-title">Science Department</h2>
          <div class="faculty-grid" data-faculty-department="science"></div>
        </div>
      </section>

      <!-- Commerce Department -->
      <section class="faculty-section faculty-department-section section-padding">
        <div class="container">
          <h2 class="section-title clean-title">Commerce Department</h2>
          <div class="faculty-grid" data-faculty-department="commerce"></div>
        </div>
      </section>

      <!-- Language Department -->
      <section class="faculty-section faculty-department-section section-padding bg-light-ivory">
        <div class="container">
          <h2 class="section-title clean-title">Language Department</h2>
          <div class="faculty-grid" data-faculty-department="language"></div>
        </div>
      </section>
    </main>

    <div id="footer"></div>

    <script src="./js/partials.js"></script>
    <script src="./js/faculty.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</body>
</html>
